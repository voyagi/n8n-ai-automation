<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Contact Us — AI-Powered Form Demo</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<div class="container">
		<header>
			<h1>Contact Us</h1>
			<p>Your message will be processed by AI and routed to the right team.</p>
		</header>

		<form id="contact-form">
			<div class="form-group">
				<label for="name">Name</label>
				<input type="text" id="name" name="name" required placeholder="Your full name">
			</div>

			<div class="form-group">
				<label for="email">Email</label>
				<input type="email" id="email" name="email" required placeholder="you@example.com">
			</div>

			<div class="form-group">
				<label for="subject">Subject</label>
				<select id="subject" name="subject" required>
					<option value="">Select a topic...</option>
					<option value="support">Technical Support</option>
					<option value="sales">Sales Inquiry</option>
					<option value="feedback">Feedback</option>
					<option value="other">Other</option>
				</select>
			</div>

			<div class="form-group">
				<label for="message">Message</label>
				<textarea id="message" name="message" required rows="5" placeholder="Tell us how we can help..."></textarea>
			</div>

			<button type="submit" id="submit-btn">Send Message</button>
		</form>

		<div id="status" class="status hidden"></div>

		<footer>
			<p>Powered by n8n + OpenAI — <a href="https://github.com/voyagi/upwork-n8n-automation">View source</a></p>
		</footer>
	</div>

	<script src="script.js"></script>
</body>
</html>
